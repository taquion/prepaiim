server {
    server_name prepaiim.com www.prepaiim.com;

    # Frontend (React SPA)
    location / {
        root /var/www/prepaiim/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        # index.html nunca se cachea — fuerza fetch fresco en cada visita
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Assets con hash (JS/CSS/img) — cache 1 año, son immutable
    location /assets/ {
        root /var/www/prepaiim/frontend/dist;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/prepaiim.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/prepaiim.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.prepaiim.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = prepaiim.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name prepaiim.com www.prepaiim.com;
    return 404; # managed by Certbot




}